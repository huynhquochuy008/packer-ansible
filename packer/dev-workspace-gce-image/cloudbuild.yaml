# Perform a Packer build based on the `build.pkr.hcl` configuration
# and user variables from variables.pkrvars.hcl file. This Packer
# build creates a GCE image.
#
# See README.md for invocation instructions.
steps:
- name: 'us-central1-docker.pkg.dev/project-e9789cd8-19b6-4ec2-b33/cloudrun-images/packer:1.15.0'
  args:
  - init
  - -var-file=variables.pkrvars.hcl
  - build.pkr.hcl
  dir: packer/dev-workspace-gce-image

- name: 'us-central1-docker.pkg.dev/project-e9789cd8-19b6-4ec2-b33/cloudrun-images/packer:1.15.0'
  args:
  - build
  - -var-file=variables.pkrvars.hcl
  - build.pkr.hcl
  dir: packer/dev-workspace-gce-image

tags: ['cloud-builders']

options:
  logging: CLOUD_LOGGING_ONLY
